<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Fall</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:black; overflow:hidden; touch-action:manipulation; overscroll-behavior:none; font-family:system-ui,sans-serif; }
.game { position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; }
.hint { color:#fff; font-size:24px; margin-bottom:10px; font-family:monospace; }
canvas { background:#000; border:none !important; display:block; }
#introScreen { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; opacity:1; transition: opacity 0.8s ease; }
.title { font-family:'Press Start 2P', monospace; font-size:32px; color:white; display:flex; gap:6px; }
.title span { opacity:0; transform:translateY(20px); animation:reveal 0.6s ease forwards; }
.title span:nth-child(1){animation-delay:0.1s;} .title span:nth-child(2){animation-delay:0.2s;} .title span:nth-child(3){animation-delay:0.3s;} .title span:nth-child(4){animation-delay:0.4s;} .title span:nth-child(6){animation-delay:0.6s;} .title span:nth-child(7){animation-delay:0.7s;} .title span:nth-child(8){animation-delay:0.8s;} .title span:nth-child(9){animation-delay:0.9s;}
.subtitle { margin-top:25px; font-family:'Press Start 2P', monospace; font-size:10px; color:rgba(255,255,255,0.8); opacity:0; animation:fadeSub 1s ease forwards; animation-delay:1.2s; letter-spacing:2px; }
@keyframes reveal { to { opacity:1; transform:translateY(0); } }
@keyframes fadeSub { to { opacity:1; } }  
.controls { margin-top:10px; display:flex; gap:10px; }
.controls button { background:black; color:white; border:1px solid white; padding:12px 16px; font-size:18px; border-radius:6px; }
</style>
</head>

<body>
<div id="introScreen">
  <div class="title"><span>W</span><span>O</span><span>®</span><span>D</span><span class="space"></span><span>F</span><span>@</span><span>L</span><span>L</span></div>
  <div class="subtitle">LOGIC</div>
</div>

<div class="game">
  <div class="hint"><span id="wordHint">Hint</span></div>
  <canvas id="wordFallCanvas" width="300" height="600"></canvas>
  <div class="controls">
    <button onclick="startGame()">START</button>
    <button onclick="move(-1)">◀</button>
    <button onclick="dropFast()">▼</button>
    <button onclick="move(1)">▶</button>
    <button onclick="restartGame()">RESET</button>
  </div>
</div>

<script>
// ===== CANVAS & GRID =====
const canvas = document.getElementById('wordFallCanvas');
const ctx = canvas.getContext('2d');
ctx.scale(30,30);
const arena = Array.from({length:20},()=>Array(10).fill(null));
const highlights = Array.from({length:20},()=>Array(10).fill(null));
const player={pos:{x:0,y:0},letter:''};
let targetWord='', gameRunning=false;

// ===== Wörter & Farben =====
const WORDS=['ABOMINABLE','REPOSITORY','CROSSBREED','DISASTROUS','EVERYTHING','FASCINATOR','REFRESHING','HEARTBEATS','IMMEDIATES','JOURNALISM','KNIGHTHOOD','LANDSCAPER','MASTERMIND','NIGHTSTAND','OPERATIONS','POPULATION','QUARTERBACK','RENDEZVOUS','SCRATCHING','LEGENDARYS','UNDERTAKER','VOLUNTEERS','WATERMELON','XENOPHOBIC','YELLOWHAZE','ZOOLOGISTS'];
const COLORS=['#00ffcc','#ffcc00','#ff6699','#66ff66','#66ccff'];
let wordQueue=[], wordIndex=0;
function shuffleWords(){ wordQueue=[...WORDS].sort(()=>Math.random()-0.5); wordIndex=0; }

// ===== FRAME (Physisch) =====
let frameX=0, frameY=0, frameH=10, round=1, maxRounds=9, fakeFrames=[], pulseActive=false, pulseTime=0, pulseDuration=300, lettersFallingFromFrame=[];

const originalFrameColors=['#00ff00','#ff0000','#00ffff','#ff00ff','#ffff00','#ff8800','#8888ff','#ffffff','#ff4444'];

// ===== Spiel Logik =====
function collide(a,p){ const {x,y}=p.pos; return y>=a.length||x<0||x>=a[0].length||a[y][x]!==null; }
function merge(a,p){ a[p.pos.y][p.pos.x]=p.letter; }
function move(dir){ player.pos.x+=dir; if(collide(arena,player)) player.pos.x-=dir; }
function drop(){ if(!gameRunning)return; player.pos.y++; if(collide(arena,player)){ player.pos.y--; merge(arena,player); checkAndClearWords(); resetPlayer(); } }
function randomLetter(){ return String.fromCharCode(65+Math.floor(Math.random()*26)); }
function resetPlayer(){ player.letter=randomLetter(); player.pos.y=0; player.pos.x=Math.floor(arena[0].length/2); if(collide(arena,player)) arena.forEach(r=>r.fill(null)); }

// ===== Rahmen ins Grid schreiben =====
function setFrameInArena(){
  for(let y=frameY; y<frameY+frameH; y++){
    arena[y][frameX]=arena[y][frameX]||randomLetter();
  }
}

// ===== Neues Zielwort =====
function newTargetWord(){
  if(wordQueue.length===0||wordIndex>=wordQueue.length) shuffleWords();
  targetWord=wordQueue[wordIndex++];
  document.getElementById('wordHint').textContent=getMaskedWord(targetWord,round);
  randomizeFrame();
  setFrameInArena();
}

function getMaskedWord(word,round){
  if(round<=1) return word;
  let letters=word.split('');
  let hideCount=Math.min(round-1,letters.length-2);
  let indexes=[];
  while(indexes.length<hideCount){
    let i=Math.floor(Math.random()*letters.length);
    if(!indexes.includes(i)) indexes.push(i);
  }
  indexes.forEach(i=>letters[i]='_');
  return letters.join('');
}

function randomizeFrame(){ frameX=Math.floor(Math.random()*arena[0].length); const minY=5,maxY=arena.length-frameH; frameY=Math.floor(Math.random()*(maxY-minY))+minY; }

// ===== Wort prüfen & löschen =====
function checkAndClearWords(){
  highlights.forEach(r=>r.fill(null));
  const found=findWords();
  if(!found.length) return;
  let targetFound=false;
  found.forEach(group=>{
    const letters=group.map(([y,x])=>arena[y][x]).join('');
    if(letters.toUpperCase()===targetWord){ 
      const inFrame=group.every(([y,x])=>x===frameX&&y>=frameY&&y<frameY+frameH);
      if(inFrame) targetFound=true;
    }
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    group.forEach(([y,x])=>highlights[y][x]=color);
  });

  setTimeout(()=>{
    if(targetFound){
      arena.forEach(r=>r.fill(null));
      highlights.forEach(r=>r.fill(null));
      round++; if(round>maxRounds) round=maxRounds;
      newTargetWord();
    }else{
      found.flat().forEach(([y,x])=>arena[y][x]=null);
    }
  },300);
}

function findWords(){
  const found=[];
  for(let y=0;y<arena.length;y++){
    let word='', pos=[];
    for(let x=0;x<=arena[0].length;x++){
      const c=arena[y][x];
      if(c){ word+=c; pos.push([y,x]); } else { extract(word,pos,found); word=''; pos=[]; }
    }
  }
  for(let x=0;x<arena[0].length;x++){
    let word='', pos=[];
    for(let y=0;y<=arena.length;y++){
      const c=arena[y]?.[x];
      if(c){ word+=c; pos.push([y,x]); } else { extract(word,pos,found); word=''; pos=[]; }
    }
  }
  return found;
}

function extract(word,pos,found){ if(word.length<10) return; const upperWord=word.toUpperCase(); WORDS.forEach(w=>{ const i=upperWord.indexOf(w); if(i!==-1) found.push(pos.slice(i,i+w.length)); }); }

// ===== DRAW =====
function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font='1px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  arena.forEach((row,y)=>row.forEach((v,x)=>{ if(v){ ctx.fillStyle=highlights[y][x]||COLORS[(x+y)%COLORS.length]; ctx.fillText(v,x+0.5,y+0.5); }}));
  ctx.fillStyle=COLORS[(player.pos.x+player.pos.y)%COLORS.length];
  ctx.fillText(player.letter,player.pos.x+0.5,player.pos.y+0.5);
}

// ===== LOOP =====
let lastTime=0, dropCounter=0, dropInterval=700;
function update(time=0){
  const delta=time-lastTime; lastTime=time;
  if(gameRunning){ dropCounter+=delta; if(dropCounter>dropInterval){ drop(); dropCounter=0; } }
  draw();
  requestAnimationFrame(update);
}

// ===== INPUT =====
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); if(e.key==='ArrowDown') drop(); });

// ===== BUTTONS =====
function startGame(){ if(!gameRunning){ gameRunning=true; resetPlayer(); newTargetWord(); } }
function restartGame(){ arena.forEach(r=>r.fill(null)); highlights.forEach(r=>r.fill(null)); resetPlayer(); round=1; newTargetWord(); dropCounter=0; gameRunning=true; }
function dropFast(){ if(!gameRunning)return; while(!collide(arena,player)){ player.pos.y++; } player.pos.y--; merge(arena,player); checkAndClearWords(); resetPlayer(); }

// ===== INIT =====
setTimeout(()=>{ const intro=document.getElementById('introScreen'); intro.style.opacity='0'; setTimeout(()=>{ intro.style.display='none'; },800); },5000);
if(wordQueue.length===0) shuffleWords();
update();
</script>
</body>
</html>
