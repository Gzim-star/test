<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Fall 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body { margin:0; overflow:hidden; background:black; font-family:system-ui,sans-serif; }
#controls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
#controls button{ padding:12px 16px; font-size:16px; border-radius:10px; border:1px solid white; color:white; background:black; cursor:pointer; }
#roundDisplay{position:absolute; top:20px; left:50%; transform:translateX(-50%); color:white; font-family:monospace; font-size:14px;}
#wordHint{position:absolute; top:60px; left:50%; transform:translateX(-50%); color:white; font-family:monospace; cursor:pointer;}
#mindMessage{position:absolute; top:45%; left:50%; transform:translate(-50%,-50%); color:white; font-family:'Press Start 2P', monospace; font-size:12px; opacity:0; transition:opacity 1.5s; pointer-events:none;}
</style>
</head>
<body>
<div id="roundDisplay">0/10</div>
<div id="wordHint" onclick="revealHint()">Hint</div>
<div id="mindMessage"></div>
<div id="controls">
<button onclick="startGame()">START</button>
<button onclick="move(-1)">◀</button>
<button onclick="dropFast()">▼</button>
<button onclick="move(1)">▶</button>
<button onclick="restartGame()">RESET</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/geometries/TextGeometry.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(5,10,20); camera.lookAt(5,10,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.3));
const dirLight = new THREE.DirectionalLight(0xffffff,1);
dirLight.position.set(10,20,20); scene.add(dirLight);

// ===== GAME VARIABLES =====
const ROWS=20, COLS=10;
const COLORS=['#00ffcc','#ffcc00','#ff6699','#66ff66','#66ccff'];
const originalFrameColors=['#ff3b3b','#ff8c00','#ffd700','#ffff00','#bfff00','#00ff00','#00ff7f','#00ffaa','#00ffff','#00bfff','#0080ff','#0000ff','#4b00ff','#8000ff','#bf00ff','#ff00ff','#ff00aa','#ff0066','#ff1493','#ff4500','#ff6347','#ffa500','#adff2f','#7fff00','#40e0d0','#1e90ff','#6a5acd','#9932cc','#ff69b4','#ffffff'];

let arena=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let highlights=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let wordQueue=[], wordIndex=0, targetWord='', gameRunning=false, hintRevealed=false;
let frameX=0, frameY=0, frameH=10, fakeFrames=[], round=1, maxRounds=10;
let pulseActive=false, pulseTime=0, fakePulseActive=false, fakePulseTime=0, pulseDuration=300, framesInvisible=false, mindMessageShown=false;
const player={pos:{x:0,y:0}, letter:''};
let dropInterval=700;

// ===== FONT =====
let font=null;
const loader=new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',f=>font=f);

// ===== UTIL =====
function shuffleWords(){ wordQueue=[...WORDS].sort(()=>Math.random()-0.5); wordIndex=0; }
function randomLetter(){ return String.fromCharCode(65+Math.floor(Math.random()*26)); }
function resetPlayer(){ player.letter=randomLetter(); player.pos={x:Math.floor(COLS/2),y:0}; }
function newTargetWord(){ if(wordQueue.length===0||wordIndex>=wordQueue.length) shuffleWords(); targetWord=wordQueue[wordIndex++]; frameH=Math.min(targetWord.length,10); randomizeFrame(); generateFakeFrames(); updateRoundDisplay(); updateHintMask(); }
function updateRoundDisplay(){ document.getElementById('roundDisplay').textContent=round+'/'+maxRounds; }
function updateHintMask(){ document.getElementById('wordHint').textContent=targetWord.split('').map((c,i)=>i<round-1?'_':c).join(''); }
function revealHint(){ if(hintRevealed) return; hintRevealed=true; const hintEl=document.getElementById('wordHint'); hintEl.textContent=targetWord; setTimeout(()=>{ hintEl.textContent=targetWord.split('').map((c,i)=>i<round-1?'_':c).join(''); hintRevealed=false; },2000); }
function collide(){ const {x,y}=player.pos; return y>=ROWS||x<0||x>=COLS||arena[y][x]!==null; }
function merge(){ arena[player.pos.y][player.pos.x]=player.letter; }
function move(dir){ player.pos.x+=dir; if(collide()) player.pos.x-=dir; }
function drop(){ if(!gameRunning)return; player.pos.y++; if(collide()){ player.pos.y--; merge(); checkAndClearWords(); resetPlayer(); } }
function dropFast(){ if(!gameRunning)return; while(!collide()){player.pos.y++;} player.pos.y--; merge(); checkAndClearWords(); resetPlayer(); }
function randomizeFrame(){ frameX=Math.floor(Math.random()*COLS); frameY=Math.floor(Math.random()*(ROWS-frameH-5))+5; }
function generateFakeFrames(){ fakeFrames=[]; for(let i=0;i<round-1;i++){ let fx=Math.floor(Math.random()*COLS); let fy=Math.floor(Math.random()*(ROWS-frameH-5))+5; fakeFrames.push({x:fx,y:fy,color:COLORS[i%COLORS.length]}); } }

// ===== DRAW 3D =====
let fallingLetters=[];
for(let x=0;x<COLS;x++) for(let y=0;y<ROWS/2;y++) fallingLetters.push({x:x,y:-Math.random()*ROWS,letter:randomLetter(),color:COLORS[Math.floor(Math.random()*COLORS.length)],speed:0.05+Math.random()*0.15});

function draw3D(){
  while(scene.children.length>0) scene.remove(scene.children[0]);
  scene.add(dirLight);

  fallingLetters.forEach(l=>{
    l.y+=l.speed;
    if(l.y>ROWS) l.y=-Math.random()*ROWS;
    if(font){ const geo=new THREE.TextGeometry(l.letter,{font,size:0.5,height:0.1}); const mat=new THREE.MeshStandardMaterial({color:l.color}); const mesh=new THREE.Mesh(geo,mat); mesh.position.set(l.x+0.2,l.y+0.2,-0.5); scene.add(mesh); }
  });

  if(!framesInvisible){
    let scale=1;
    if(pulseActive){ pulseTime+=16; let p=pulseTime/pulseDuration; if(p>=1)pulseActive=false; else scale=1+Math.sin(p*Math.PI)*0.15;}
    const geo=new THREE.BoxGeometry(1*scale,frameH*scale,0.5*scale);
    const mat=new THREE.MeshStandardMaterial({color:originalFrameColors[round-1]});
    const cube=new THREE.Mesh(geo,mat); cube.position.set(frameX+0.5,frameY+frameH/2,0); scene.add(cube);}
  
  fakeFrames.forEach(f=>{
    let scale=1;
    if(fakePulseActive){ fakePulseTime+=16; let p=fakePulseTime/pulseDuration; if(p>=1)fakePulseActive=false; else scale=1+Math.sin(p*Math.PI)*0.15;}
    const geo=new THREE.BoxGeometry(1*scale,frameH*scale,0.5*scale);
    const mat=new THREE.MeshStandardMaterial({color:f.color}); const cube=new THREE.Mesh(geo,mat); cube.position.set(f.x+0.5,f.y+frameH/2,0); scene.add(cube);
  });

  arena.forEach((row,y)=>row.forEach((v,x)=>{ if(v && font){ const geo=new THREE.TextGeometry(v,{font,size:0.8,height:0.2}); const mat=new THREE.MeshStandardMaterial({color:COLORS[(x+y)%COLORS.length]}); const mesh=new THREE.Mesh(geo,mat); mesh.position.set(x+0.1,y+0.1,0.3); scene.add(mesh); }}));

  if(font){ const geo=new THREE.TextGeometry(player.letter,{font,size:0.8,height:0.2}); const mat=new THREE.MeshStandardMaterial({color:'#ffffff'}); const mesh=new THREE.Mesh(geo,mat); mesh.position.set(player.pos.x+0.1,player.pos.y+0.1,0.3); scene.add(mesh); }

  renderer.render(scene,camera);
}
function update(){ draw3D(); requestAnimationFrame(update);}
update();

// ===== INPUT =====
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft') move(-1); if(e.key==='ArrowRight') move(1); if(e.key==='ArrowDown') drop(); });

</script>
</body>
</html>
